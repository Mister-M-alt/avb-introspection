#
# Remote deployment: nginx in front of the backend (SE-4).
#   docker compose -f deploy/docker-compose.yml up --build
# The UI is then reachable on port 80 of this host; pcaps, sessions and
# accounts persist in the avb-data volume (BE-8). For TLS, mount your
# certificates and enable the 443 server block in nginx.conf.

services:
  app:
    build: ..
    volumes:
      - avb-data:/data
    restart: unless-stopped
    # Only nginx is exposed; the backend stays on the compose network.

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # - "443:443"          # enable together with the TLS server block
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  avb-data:
