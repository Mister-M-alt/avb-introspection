# Reverse proxy for remote deployments (SE-4/OQ-12): terminates TLS in
# front of avb-introspectd and forwards the WebSocket event stream.
#
# Used as-is by deploy/docker-compose.yml (upstream "app"). For a
# bare-metal nginx, change the upstream server to 127.0.0.1:8342 and
# drop this file into /etc/nginx/conf.d/.
#
# Hardening rationale and a full verification checklist: docs/SECURITY.md.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# First-line flood defence, in front of the app's own token-bucket limiter
# (docs/SECURITY.md §5-6). These directives require http{} context — when this
# file is dropped into conf.d/ it is already inside http{}, so they belong at
# the top of the file. Tune the rates to your user population.
limit_req_zone  $binary_remote_addr zone=avb_api:10m   rate=40r/s;   # per-IP API
limit_req_zone  $binary_remote_addr zone=avb_login:10m rate=1r/s;    # per-IP login
limit_conn_zone $binary_remote_addr zone=avb_conn:10m;               # per-IP conns

upstream avb_backend {
    server app:8342;          # bare metal: 127.0.0.1:8342
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # Uploads up to the backend's --max-upload-mb (default 1024 MiB, BE-5).
    client_max_body_size 1024m;
    # Stream pcap uploads through instead of buffering them to disk twice.
    proxy_request_buffering off;

    # Per-IP concurrent-connection cap + burst-tolerant request rate. The app
    # enforces per-user/per-endpoint limits too; this is the network-edge tier.
    limit_conn avb_conn 32;
    limit_req  zone=avb_api burst=80 nodelay;
    limit_req_status 429;
    limit_conn_status 429;

    # Security headers — the SPA is fully self-contained, so a strict CSP with
    # no external origins is safe. Do not leak the upstream server token.
    add_header X-Content-Type-Options nosniff            always;
    add_header X-Frame-Options        DENY               always;
    add_header Referrer-Policy        no-referrer        always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
    proxy_hide_header X-Powered-By;
    server_tokens off;

    # Tighter throttle on the unauthenticated auth endpoints (brute force).
    location = /api/login    { limit_req zone=avb_login burst=5 nodelay; proxy_pass http://avb_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /api/register { limit_req zone=avb_login burst=5 nodelay; proxy_pass http://avb_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }

    # ---- app mounted under a path prefix: http://<ip>/avb_investigation/ --
    # Rename the prefix freely — the frontend detects it at runtime, no
    # rebuild needed. The trailing slash on proxy_pass strips the prefix
    # before the request reaches the backend.

    location = /avb_investigation { return 301 /avb_investigation/; }

    location /avb_investigation/api/ws {
        proxy_pass http://avb_backend/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    location /avb_investigation/ {
        proxy_pass http://avb_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ---- app also available at the site root (remove if the root serves
    # something else) --------------------------------------------------------

    # WebSocket event stream (BE-4): upgrade headers + long idle timeout,
    # no buffering so deflated event batches reach the browser immediately.
    location /api/ws {
        proxy_pass http://avb_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    # REST API + static frontend.
    location / {
        proxy_pass http://avb_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

