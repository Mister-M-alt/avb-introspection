# ===========================================================================
#  PRODUCTION reverse-proxy TEMPLATE for a remotely-exposed deployment.
# ===========================================================================
#
# This is the hardened, TLS-terminating template for a bare-metal / VM nginx
# that fronts avb-introspectd. It is deliberately separate from the simpler
# deploy/nginx.conf used by docker-compose. Full rationale + a verification
# checklist: docs/SECURITY.md. Network placement (VLANs, firewall): docs/NETWORK.md.
#
# ---- Fill in these placeholders, then deploy -----------------------------
#   __SERVER_NAME__   public FQDN, e.g. avb.example.com
#   __APP_UPSTREAM__  backend address:port reachable ONLY from this nginx host,
#                     e.g. 127.0.0.1:8342 (nginx on the app host — recommended)
#                     or  10.30.0.10:8342 (app on its own VLAN; lock it with
#                     the host firewall so only this nginx may connect)
#   __CERT__/__KEY__  TLS certificate + private key paths (certbot or your PKI)
#   __MAX_UPLOAD__    must match the backend --max-upload-mb, e.g. 1024m
#
# ---- Install (bare metal) -------------------------------------------------
#   sudo cp deploy/nginx.production.conf /etc/nginx/conf.d/avb.conf
#   sudo sed -i 's/__SERVER_NAME__/avb.example.com/; s#__APP_UPSTREAM__#127.0.0.1:8342#; ...' \
#       /etc/nginx/conf.d/avb.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# ---- Backend runtime env (systemd drop-in) --------------------------------
#   AVB_DISABLE_REGISTRATION=1     accounts created by admins/owners only
#   AVB_ADMIN_USER / _PASSWORD     first global admin
#   (the backend also rate-limits per user and per IP — see docs/SECURITY.md §6)
# ===========================================================================

# --- WebSocket upgrade plumbing (http{} context) ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# --- Edge flood defence, in front of the app's own token-bucket limiter.
#     These live in http{} context; conf.d/ files are already inside http{}. ---
limit_req_zone  $binary_remote_addr zone=avb_api:10m   rate=40r/s;   # per-IP API
limit_req_zone  $binary_remote_addr zone=avb_login:10m rate=1r/s;    # per-IP login
limit_conn_zone $binary_remote_addr zone=avb_conn:10m;               # per-IP conns

upstream avb_backend {
    server __APP_UPSTREAM__;      # 127.0.0.1:8342 (nginx on app host) — see header
    keepalive 8;
}

# --- Modern TLS defaults (shared by the server block) ---
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache   shared:avb_ssl:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# --- 1) Plain HTTP: redirect everything to HTTPS (no app served on :80) ---
server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;
    # Allow ACME HTTP-01 renewal if you use certbot's webroot; redirect the rest.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- 2) HTTPS: the only place the app is reachable ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __SERVER_NAME__;

    ssl_certificate     __CERT__;      # e.g. /etc/letsencrypt/live/<fqdn>/fullchain.pem
    ssl_certificate_key __KEY__;       # e.g. /etc/letsencrypt/live/<fqdn>/privkey.pem

    # Uploads up to the backend's --max-upload-mb; stream them through.
    client_max_body_size __MAX_UPLOAD__;
    proxy_request_buffering off;

    # --- Security headers. The SPA is fully self-contained, so a strict CSP
    #     with no external origins is safe. Do not leak the upstream. ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff  always;
    add_header X-Frame-Options        DENY     always;
    add_header Referrer-Policy         no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    proxy_hide_header X-Powered-By;
    server_tokens off;

    # --- Edge rate + connection limits (the app enforces per-user limits too) ---
    limit_conn        avb_conn 32;
    limit_req         zone=avb_api burst=80 nodelay;
    limit_req_status  429;
    limit_conn_status 429;

    # Common proxy headers (the app trusts X-Real-IP only from a loopback peer,
    # so set it here; a remote client cannot forge past the per-IP limiter).
    # NOTE: nginx does NOT merge proxy_set_header across levels — a location
    # that sets ANY proxy_set_header loses ALL of these. So the /api/ws and /
    # blocks below re-declare them. The login/register blocks set none, so they
    # inherit these server-level ones.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # --- Tighter throttle on the unauthenticated auth endpoints (brute force) ---
    location = /api/login {
        limit_req zone=avb_login burst=5 nodelay;
        proxy_pass http://avb_backend;
    }
    location = /api/register {
        limit_req zone=avb_login burst=5 nodelay;
        proxy_pass http://avb_backend;
    }

    # --- WebSocket event stream: upgrade headers + long idle, no buffering ---
    location /api/ws {
        proxy_pass http://avb_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    # --- REST API + static frontend ---
    location / {
        proxy_pass http://avb_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}

# ===========================================================================
#  MULTI-TENANT VARIANT — one backend container per domain (stronger
#  isolation for mutually-untrusting tenants; docs/SECURITY.md §4).
#  Route by subdomain (shown) or by path prefix (the SPA auto-detects its
#  base path, so /acme/ works with a trailing-slash proxy_pass).
# ---------------------------------------------------------------------------
# upstream avb_acme   { server 127.0.0.1:8342; keepalive 8; }
# upstream avb_globex { server 127.0.0.1:8343; keepalive 8; }
#
# server {
#     listen 443 ssl; http2 on;
#     server_name acme.__SERVER_NAME__;
#     ssl_certificate __CERT__; ssl_certificate_key __KEY__;
#     client_max_body_size __MAX_UPLOAD__;
#     # ... same headers + limits as above ...
#     location /api/ws { proxy_pass http://avb_acme; proxy_http_version 1.1;
#         proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
#         proxy_read_timeout 1h; proxy_buffering off; }
#     location /       { proxy_pass http://avb_acme; proxy_http_version 1.1;
#         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
# }
# # ...repeat one server{} per tenant, each to its own upstream/container/volume.
# ===========================================================================
